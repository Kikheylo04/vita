<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#0f0c08"/>
  <!-- Copa de vino estilizada -->
  <path d="M12 5 L20 5 L18 13 C18 16, 17 17, 16 17 C15 17, 14 16, 14 13 Z" fill="none" stroke="#D4A843" stroke-width="1.2" stroke-linejoin="round"/>
  <line x1="16" y1="17" x2="16" y2="23" stroke="#D4A843" stroke-width="1.2"/>
  <line x1="12" y1="23" x2="20" y2="23" stroke="#D4A843" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Punto de vino dentro de la copa -->
  <ellipse cx="16" cy="11" rx="2.5" ry="2" fill="#9B2020" opacity="0.7"/>
  <!-- Letra V sutil debajo -->
  <text x="16" y="30" font-family="Georgia, serif" font-size="5.5" fill="#D4A843" text-anchor="middle" letter-spacing="2" opacity="0.9">VITA</text>
</svg>
